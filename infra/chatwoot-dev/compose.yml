name: wootpilot-chatwoot-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatwoot_dev
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: chatwoot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot -d chatwoot_dev"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - chatwoot

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - chatwoot

  chatwoot-prepare:
    image: ${CHATWOOT_IMAGE:-chatwoot/chatwoot:v4.14.1}
    env_file:
      - ./chatwoot.env
    environment:
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL:-http://localhost:3000}
    command: ["bundle", "exec", "rails", "db:chatwoot_prepare"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chatwoot

  chatwoot-web:
    image: ${CHATWOOT_IMAGE:-chatwoot/chatwoot:v4.14.1}
    env_file:
      - ./chatwoot.env
    environment:
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL:-http://localhost:3000}
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    ports:
      - "${CHATWOOT_PORT:-3000}:3000"
    depends_on:
      chatwoot-prepare:
        condition: service_completed_successfully
    networks:
      - chatwoot

  chatwoot-worker:
    image: ${CHATWOOT_IMAGE:-chatwoot/chatwoot:v4.14.1}
    env_file:
      - ./chatwoot.env
    environment:
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL:-http://localhost:3000}
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    depends_on:
      chatwoot-prepare:
        condition: service_completed_successfully
    networks:
      - chatwoot

networks:
  chatwoot:
